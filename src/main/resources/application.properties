spring.application.name=Spring

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
logging.level.org.apache.pdfbox.pdmodel.font.PDSimpleFont=ERROR

# MySQL / JPA readiness:
# Provide these with environment variables in deployment.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ieee_compliance}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Keep startup tolerant until repository usage is wired into the upload flow.
spring.datasource.hikari.initialization-fail-timeout=0
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# Local demo file storage for uploaded PDFs.
app.file-storage.upload-dir=${UPLOAD_DIR:uploads}

# Cloud Run sets PORT env var; use it. test.
server.port=${PORT:8080}
